<main class="auth-page">
  <a class="auth-brand" routerLink="/">CODE INK <span>ESTÚDIO</span></a>
  <section class="auth-card" aria-labelledby="login-title">
    <header>
      <p class="eyebrow">Bem-vindo</p>
      <h1 id="login-title">Acesse sua conta</h1>
      <p>Entre para acompanhar agendamentos e favoritos.</p>
    </header>
    <form [formGroup]="formulario" (ngSubmit)="entrar()" novalidate>
      <label>Email<input type="email" formControlName="email" autocomplete="email" /></label>
      <label
        >Senha<span class="password-field"
          ><input
            [type]="mostrarSenha() ? 'text' : 'password'"
            formControlName="senha"
            autocomplete="current-password"
          /><button
            type="button"
            (click)="mostrarSenha.update((v) => !v)"
            [attr.aria-label]="mostrarSenha() ? 'Ocultar senha' : 'Mostrar senha'"
          >
            {{ mostrarSenha() ? 'Ocultar' : 'Mostrar' }}
          </button></span
        ></label
      >
      <div class="auth-options">
        <label class="checkbox"
          ><input type="checkbox" formControlName="lembrar" /> Lembrar de mim</label
        ><button class="link-button" type="button">Esqueci minha senha</button>
      </div>
      @if (mensagemErro()) {
        <p class="form-error" role="alert">{{ mensagemErro() }}</p>
      }
      <button class="button button--full" type="submit">Entrar</button>
    </form>
    <div class="demo-info">
      <strong>Credenciais de demonstração</strong><span>Admin: admin@email.com / 123456</span
      ><span>Cliente: cliente@email.com / 123456</span>
    </div>
    <p class="auth-footer">Ainda não tem conta? <a routerLink="/cadastro">Cadastre-se</a></p>
  </section>
</main>
